# Temporal Cloud connection config for the Lambda worker.
# In production, pull certs and API keys from Secrets Manager instead of
# bundling them here. See the lambda-worker README for details.

[profile.default]
address    = "<your-namespace>.<account-id>.tmprl.cloud:7233"
namespace  = "<your-namespace>.<account-id>"

[profile.default.tls]
client-cert = "/var/task/certs/client.pem"
client-key  = "/var/task/certs/client.key"
